version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
    gosec:
      excludes:
        - G101 # password-shaped field names are false positives in config
        - G104 # duplicates errcheck (which has its own exclusions)
        - G301 # dir perms 0o755 are fine for log output dirs
        - G302 # file perms 0o644 are fine for log output files
        - G304 # file paths come from config, not untrusted input
        - G404 # use of weak rng is fine for reservoir sampling (non-crypto)
    revive:
      # The 'exported' rule would require a doc comment on every exported
      # identifier; for internal/* packages this is noisy. Keep style
      # checks on but drop that one.
      rules:
        - name: var-naming
        - name: error-return
        - name: error-strings
        - name: context-as-argument
        - name: context-keys-type
        - name: time-naming

  exclusions:
    rules:
      # Tests are allowed to drop cleanup error returns.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # Close() error returns on cleanup paths — net.Conn, os.File, sql.Rows,
      # lumberjack.Logger, etc. — are conventionally dropped in Go. There's
      # no meaningful recovery on already-closing resources.
      - text: 'Error return value of `.+\.Close` is not checked'
        linters:
          - errcheck
      # These exported type names intentionally "stutter" — renaming would
      # break the JSON output schema (CompareResult) and user-facing log
      # identifiers (ProxyServer, ProxyHandler in tracebacks).
      - text: "ProxyHandler|ProxyServer|CompareResult"
        linters:
          - revive
      # Deliberately retained API methods used across packages and tests.
      - text: "SetProgress|IsEnabled|Skipped|Dropped"
        linters:
          - unused

formatters:
  enable:
    - gofmt
    - goimports
