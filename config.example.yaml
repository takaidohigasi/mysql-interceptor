proxy:
  listen_addr: "0.0.0.0:3307"
  metrics_addr: "127.0.0.1:9090"   # "" to disable; exposes /healthz, /metrics, /debug/vars
  max_connections: 1000
  shutdown_timeout: 30s
  # users defines the credentials the proxy will accept on the inbound
  # handshake. The matched (username, password) pair is also used to
  # authenticate the per-session outbound connection to the backend (and
  # shadow, if shadow mode is on), so per-user GRANTs apply consistently.
  # At least one entry is required; the proxy never synthesizes its own
  # credentials.
  users:
    - username: "app_user"
      password: "app_pw"
    # - username: "ro_user"
    #   password: "ro_pw"
  # Optional cap on session lifetime — useful for forcing periodic
  # reconnects so existing sessions rebalance onto new backends after
  # autoscaling. After the cap (with ±10% per-session jitter) elapses,
  # the proxy closes the session at the next safe boundary (between
  # commands, only when the backend is not in a transaction). 0 disables.
  # Hot-reloadable.
  # max_session_lifetime: 1h

backend:
  addr: "127.0.0.1:3306"
  db: ""

tls:
  client_side:
    enabled: false
    cert_file: ""
    key_file: ""
    ca_file: ""
  backend_side:
    enabled: false
    ca_file: ""
    skip_verify: false

logging:
  enabled: true
  output_dir: "./logs"
  file_prefix: "queries"
  redact_args: false       # set true to replace prepared-stmt bind values with <redacted>
  queue_size: 10000        # async log buffer; overflow → logger_dropped counter
  rotation:
    max_size_mb: 100
    max_age_days: 7
    max_backups: 5
    compress: true

replay:
  mode: "disabled"    # "disabled" | "shadow" | "offline"
  shadow:
    enabled: true           # hot-reloadable: set false to pause shadow sending
    target_addr: "127.0.0.1:3307"
    target_user: "root"
    target_password: ""
    tls:
      enabled: false
      ca_file: ""
      skip_verify: false
    readonly: true          # always enforced — non-SELECT queries are never replayed
    timeout: 5s             # per-query timeout; slow shadows are abandoned
    max_concurrent: 100
    queue_size: 10000       # shadow queue buffer; overflow → shadow_dropped counter
    sample_rate: 1.0        # fraction of queries to shadow (0.0–1.0); cap overhead under load
    # CIDR filters (hot-reloadable). Empty lists mean "no restriction".
    # Evaluation: exclude wins over allow — a source IP matching any
    # excluded_source_cidrs is never shadowed. If allowed_source_cidrs is
    # non-empty, the source IP must also match one of them.
    #   allowed_source_cidrs:
    #     - "10.0.0.0/8"      # only internal app servers
    #     - "192.168.1.0/24"
    #   excluded_source_cidrs:
    #     - "10.0.5.0/24"     # never shadow DBA hosts
    allowed_source_cidrs: []
    excluded_source_cidrs: []
  offline:
    input_dir: "./logs"
    file_pattern: "queries-*.jsonl"
    target_addr: "127.0.0.1:3308"
    target_user: "root"
    target_password: ""
    tls:
      enabled: false
      ca_file: ""
      skip_verify: false
    speed_factor: 1.0
    concurrency: 10
    checkpoint_file: "./logs/.replay-checkpoint.json"
    auto_delete_completed: false
    scanner_buffer_size_bytes: 1048576  # max single log-line length; bump if queries are huge

comparison:
  output_file: "./logs/diff-report.jsonl"
  ignore_columns: ["updated_at", "created_at"]
  time_threshold_ms: 100
  max_unique_digests: 10000    # cap on unique query patterns tracked
                               # (each entry ≤ ~160 KB; overflow → counter)
  # Queries that match any of these case-insensitive regexes are still
  # recorded in the diff report but marked "ignored" instead of counted
  # as differences. Use for queries that read server-local state and
  # always diverge between MySQL instances.
  ignore_queries:
    - "@@server_uuid"
    - "@@hostname"
    - "@@server_id"
    - "CONNECTION_ID\\s*\\("
    - "LAST_INSERT_ID\\s*\\("
    - "\\bNOW\\s*\\("
    - "\\bCURRENT_TIMESTAMP\\b"
    - "\\bUUID\\s*\\("
    - "\\bRAND\\s*\\("

bench:
  queries:
    - "SELECT 1"
    - "SELECT * FROM information_schema.tables LIMIT 10"
  concurrency: 4
  iterations: 1000
  warmup_iterations: 50
